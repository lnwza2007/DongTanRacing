<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Racing Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Left Side Flag Indicator -->
  <div class="side-flag flag-blue"></div>

  <main class="dashboard">
    <!-- TOP ROW (Span across middle) -->
    <div class="top-row">
      <div class="speed-rpm-container">
        <div class="top-box">
          <div class="value cyan spd-val" id="speed">230</div>
        </div>
        <div class="top-box">
          <div class="value white rpm-val" id="rpm">11500</div>
        </div>
        <div class="top-labels">
          <span class="line-label">SPD</span>
          <span class="line-label">RPM</span>
        </div>
      </div>
    </div>

    <!-- MAIN GRID -->
    <div class="grid">
      <!-- LEFT COLUMN: Tyres & Bottom Left Info -->
      <div class="col-left">
        <!-- Tyres -->
        <div class="tyres-grid">
          <!-- FL -->
          <div class="tyre-box">
            <div class="tyre-header">FLTyre</div>
            <div class="tyre-data">
              <div class="t-box bg-green t-black">40</div>
              <div class="t-box bg-black t-green">10</div>
            </div>
          </div>
          <!-- FR -->
          <div class="tyre-box">
            <div class="tyre-header">FRTyre</div>
            <div class="tyre-data">
              <div class="t-box bg-black t-green">10</div>
              <div class="t-box bg-green t-black">40</div>
            </div>
          </div>
          <!-- RL -->
          <div class="tyre-box">
            <div class="tyre-header">RLTyre</div>
            <div class="tyre-data">
              <div class="t-box bg-green t-black">40</div>
              <div class="t-box bg-black t-green">10</div>
            </div>
          </div>
          <!-- RR -->
          <div class="tyre-box">
            <div class="tyre-header">RRTyre</div>
            <div class="tyre-data">
              <div class="t-box bg-black t-green">10</div>
              <div class="t-box bg-green t-black">40</div>
            </div>
          </div>
        </div>

        <!-- Bottom Left -->
        <div class="info-row">
          <div class="info-box">
            <div class="info-label">Time</div>
            <div class="info-val cyan" id="time">01:04:32</div>
          </div>
          <div class="info-box">
            <div class="info-label">Pos</div>
            <div class="info-val blue" id="pos">12</div>
          </div>
          <div class="info-box">
            <div class="info-label">SC Panel</div>
            <div class="info-val yellow" id="sc-panel">VSC</div>
          </div>
        </div>

        <div class="info-row">
          <div class="info-box">
            <div class="info-label"><span class="red-dot"></span>Lap</div>
            <div class="info-val red" id="lap">14</div>
          </div>
          <div class="info-box">
            <div class="info-label">Total Laps</div>
            <div class="info-val red" id="total-laps">14</div>
          </div>
          <div class="info-box">
            <div class="info-label">SC Delta</div>
            <div class="info-val yellow" id="sc-delta">+1.045</div>
          </div>
        </div>
      </div>

      <!-- CENTER COLUMN: Gear -->
      <div class="col-center">
        <div class="gear" id="gear">5</div>
      </div>

      <!-- RIGHT COLUMN: Fuel, Gaps, Lap Times -->
      <div class="col-right">
        <div class="fuel-box">
          <div class="f-label">Fuel</div>
          <div class="f-val green" id="fuel">26</div>
        </div>
        <div class="fuel-box">
          <div class="f-label">Fuel Estimated Laps</div>
          <div class="f-val green" id="fuel-laps">12.1</div>
        </div>

        <div class="gap-box">
          <div class="g-label">Gap Ahead</div>
          <div class="g-val white" id="gap-ahead">+1.23</div>
        </div>
        <div class="gap-box">
          <div class="g-label">Gap Behind</div>
          <div class="g-val white" id="gap-behind">-2.34</div>
        </div>

        <div class="lap-times">
          <div class="l-label">Current Lap</div>
          <div class="l-val red" id="current-lap">01:12:378</div>
          
          <div class="l-row">
            <span class="l-sub">Best</span>
            <span class="l-val green" id="best-lap">01:30:378</span>
          </div>
          <div class="l-row">
            <span class="l-sub">Last</span>
            <span class="l-val white" id="last-lap">01:12:378</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Right Side Flag Indicator -->
  <div class="side-flag flag-red"></div>

  <script src="app.js"></script>
</body>
</html>
